# Manifest for RHCOS based on RHEL 9.4

rojig:
  license: MIT
  name: rhcos
  summary: OpenShift 4

variables:
  osversion: "rhel-9.4"

# Include manifests common to all RHEL and CentOS Stream versions and manifest
# common to RHEL 9 & C9S variants
include:
  - common.yaml
  - packages-openshift.yaml
  # Order *after* packages-openshift.yaml because we want to affect
  # postprocess scripts in it. Confusingly, rpm-ostree include semantics
  # means that postprocess scripts in latter includes happen before earlier
  # ones and it's probably too risky to change that now. See also comment in
  # rhel-9.4-os-release.yaml
  - rhel-9.4-os-release.yaml

# Starting from here, everything should be specific to RHCOS based on RHEL 9.4 content

# CentOS Stream 9 repos + internal repos for now
repos:
  - baseos
  - appstream
  - rhel-9.2-fast-datapath
  # Include RHCOS 9 repo for oc, kubelet
  - rhel-9.2-server-ose-4.16

# We include hours/minutes to avoid version number reuse
automatic-version-prefix: "416.94.<date:%Y%m%d%H%M>"
# This ensures we're semver-compatible which OpenShift wants
automatic-version-suffix: "-"
# Keep this is sync with the version in postprocess
mutate-os-release: "4.16"

# Packages that are only in RHCOS and not in SCOS or that have special
# constraints that do not apply to SCOS
packages:
 # We include the generic release package and tweak the os-release info in a
 # post-proces script
 - centos-release

# Packages pinned to specific repos in SCOS 9
repo-packages:
  # We always want the kernel from BaseOS
  - repo: baseos
    packages:
      - kernel
  - repo: appstream
    packages:
      - nss-altfiles
  - repo: rhel-9.2-server-ose-4.16
    packages:
      - conmon-rs
      - cri-o
      - cri-tools
      - openshift-clients
      - openshift-kubelet
